name: Build and Release Extensions
on:
  push:
    tags:
      - 'custom-home-page/v*'
      - 'scene-analytics/v*'
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '10.0.x'
  COVE_PLUGINS_VERSION: '0.0.1'

permissions:
  contents: write
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        extension:
          - name: CustomHomePage
            id: cove.official.custom-home-page
            path: extensions/CustomHomePage
            tag-prefix: custom-home-page/
          - name: SceneAnalytics
            id: cove.official.scene-analytics
            path: extensions/SceneAnalytics
            tag-prefix: scene-analytics/

    steps:
      - name: Check if this extension was tagged
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "match=true" >> "$GITHUB_OUTPUT"
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            if [[ "$TAG" == "${{ matrix.extension.tag-prefix }}"* ]]; then
              echo "match=true" >> "$GITHUB_OUTPUT"
              echo "version=${TAG#${{ matrix.extension.tag-prefix }}v}" >> "$GITHUB_OUTPUT"
            else
              echo "match=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - uses: actions/checkout@v6
        if: steps.check.outputs.match == 'true'

      - name: Setup .NET
        if: steps.check.outputs.match == 'true'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Configure GitHub Packages source
        if: steps.check.outputs.match == 'true'
        run: >
          dotnet nuget add source
          "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          --name github
          --username "${{ github.actor }}"
          --password "${{ secrets.GITHUB_TOKEN }}"
          --store-password-in-clear-text

      - name: Restore
        if: steps.check.outputs.match == 'true'
        run: dotnet restore ${{ matrix.extension.path }} -p:CovePluginsVersion=${{ env.COVE_PLUGINS_VERSION }}

      - name: Build
        if: steps.check.outputs.match == 'true'
        run: dotnet build ${{ matrix.extension.path }} -c Release --no-restore -p:CovePluginsVersion=${{ env.COVE_PLUGINS_VERSION }}

      - name: Publish
        if: steps.check.outputs.match == 'true'
        run: dotnet publish ${{ matrix.extension.path }} -c Release -o artifacts/${{ matrix.extension.name }} --no-build -p:CovePluginsVersion=${{ env.COVE_PLUGINS_VERSION }}

      - name: Copy extension.json
        if: steps.check.outputs.match == 'true'
        run: cp ${{ matrix.extension.path }}/extension.json artifacts/${{ matrix.extension.name }}/

      - name: Package
        if: steps.check.outputs.match == 'true' && github.event_name != 'pull_request'
        run: |
          cd artifacts/${{ matrix.extension.name }}
          zip -r ../../${{ matrix.extension.id }}-${{ steps.check.outputs.version }}.zip .

      - name: Upload artifact
        if: steps.check.outputs.match == 'true' && github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.extension.id }}
          path: ${{ matrix.extension.id }}-*.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: '*.zip'
          generate_release_notes: true
